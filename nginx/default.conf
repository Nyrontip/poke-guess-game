server {
    listen 80;
    index index.html index.php;
    server_name localhost;

    root /var/www/html;

    # API routes - se sirven desde /var/www/html/api
    location /api/ {
        # No usar alias, dejar que intente directamente
        try_files $uri /api/index.php?$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/html/api/index.php;
            fastcgi_param PATH_INFO $uri;
        }
    }

    # PHP files (si hay en root)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Frontend SPA fallback
    location / {
        # Solo aplica fallback a index.html si NO es una ruta de API
        try_files $uri $uri/ /index.html;
    }

    # Cache busting para assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
